name: Build And Publish
on: push
jobs:
  buildmacuniversal:
    name: Build plugins for mac, ${{ matrix.csound-branch }}
    runs-on: macos-latest
    strategy:
      matrix:
        csound-branch: ["csound6", "develop"]

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: setup csound
        run: |
          git submodule update --init --recursive
          cd csound
          git switch ${{ matrix.csound-branch }}

      - name: build
        run: |
          set -x
          # brew install libsndfile
          # brew install fluidsynth

          ln -s csound/Android/CsoundAndroid/jni/version.h csound/include

          rm -fr build && mkdir build && cd build

          if [[ ${{ matrix.csound-branch }} == csound6 ]]; then
            APIVERSION=6.0
            APIMAJOR=6
          else
            APIVERSION=7.0
            APIMAJOR=7
          fi
          echo "APIVERSION = $APIVERSION"
          cmake -DSKIP_FAST_MATH=True -DBUILD_JSUSFX_OPCODES=OFF -DBUILD_SNDMETA_OPCODES=OFF -DCMAKE_OSX_ARCHITECTURES="arm64" -DAPIVERSION=$APIVERSION ..
          cmake --build . --parallel

          cd ..
          mkdir -p artifacts
          cp build/*.dylib artifacts
          cp assets/README.txt artifacts

          if [ -f scripts/macos-codesign.py ]; then
            cp scripts/macos-codesign.py artifacts
          fi

          # Make zip for release
          ARCHIVE=plugins-csound$APIMAJOR-macos-universal.zip
          7z a $ARCHIVE ./artifacts/*
          mv $ARCHIVE artifacts

      - uses: actions/upload-artifact@v4
        if: matrix.csound-branch == 'csound6'
        with:
          name: plugins-csound6-macos-universal
          path: artifacts/*

      - uses: actions/upload-artifact@v4
        if: matrix.csound-branch == 'develop'
        with:
          name: plugins-csound7-macos-universal
          path: artifacts/*

  buildlinuxportable:
    name: Build portable Linux Csound with plugins
    runs-on: ubuntu-22.04
    #container:
    #  image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
      DEPS_PREFIX: ${{ github.workspace }}/static-deps
      LIBOGG_VERSION: "1.3.5"
      LIBVORBIS_VERSION: "1.3.7"
      LIBOPUS_VERSION: "1.4"
      LIBFLAC_VERSION: "1.4.3"
      LIBSNDFILE_VERSION: "1.2.2"
      LIBLO_VERSION: "0.35"
      PORTMIDI_VERSION: "2.0.8"
      PORTAUDIO_VERSION: "19.7.0"
    steps:
      - name: Install build toolchain and audio backend headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            flex \
            bison \
            git \
            nasm \
            php-cli \
            pkg-config \
            xz-utils \
            zip \
            libasound2-dev \
            libjack-jackd2-dev

      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: lukka/get-cmake@v4.3.3

      - name: Cache static dependencies
        id: cache-static-deps
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS_PREFIX }}
          key: |
            static-deps-ubuntu22
            -ogg${{ env.LIBOGG_VERSION }}
            -vorbis${{ env.LIBVORBIS_VERSION }}
            -opus${{ env.LIBOPUS_VERSION }}
            -flac${{ env.LIBFLAC_VERSION }}
            -sndfile${{ env.LIBSNDFILE_VERSION }}
            -lo${{ env.LIBLO_VERSION }}
            -portmidi${{ env.PORTMIDI_VERSION }}
            -portaudio${{ env.PORTAUDIO_VERSION }}
            -v3

      - name: Build static dependencies
        if: steps.cache-static-deps.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "https://downloads.xiph.org/releases/ogg/libogg-${LIBOGG_VERSION}.tar.gz" | tar -xz -C /tmp
          cmake -B /tmp/ogg-build -S "/tmp/libogg-${LIBOGG_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DINSTALL_DOCS=OFF
          cmake --build /tmp/ogg-build -j"$(nproc)"
          cmake --install /tmp/ogg-build

          curl -fsSL "https://downloads.xiph.org/releases/vorbis/libvorbis-${LIBVORBIS_VERSION}.tar.gz" | tar -xz -C /tmp
          cmake -B /tmp/vorbis-build -S "/tmp/libvorbis-${LIBVORBIS_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX}" -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build /tmp/vorbis-build -j"$(nproc)"
          cmake --install /tmp/vorbis-build

          curl -fsSL "https://downloads.xiph.org/releases/opus/opus-${LIBOPUS_VERSION}.tar.gz" | tar -xz -C /tmp
          cmake -B /tmp/opus-build -S "/tmp/opus-${LIBOPUS_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DOPUS_BUILD_PROGRAMS=OFF -DOPUS_BUILD_TESTING=OFF
          cmake --build /tmp/opus-build -j"$(nproc)"
          cmake --install /tmp/opus-build

          curl -fsSL "https://downloads.xiph.org/releases/flac/flac-${LIBFLAC_VERSION}.tar.xz" | tar -xJ -C /tmp
          cmake -B /tmp/flac-build -S "/tmp/flac-${LIBFLAC_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX}" -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DWITH_OGG=ON \
            -DBUILD_DOCS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF -DINSTALL_MANPAGES=OFF
          cmake --build /tmp/flac-build -j"$(nproc)"
          cmake --install /tmp/flac-build

          curl -fsSL "https://github.com/libsndfile/libsndfile/releases/download/${LIBSNDFILE_VERSION}/libsndfile-${LIBSNDFILE_VERSION}.tar.xz" | tar -xJ -C /tmp
          cmake -B /tmp/sndfile-build -S "/tmp/libsndfile-${LIBSNDFILE_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX}" -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DBUILD_PROGRAMS=OFF \
            -DBUILD_EXAMPLES=OFF -DBUILD_TESTING=OFF -DENABLE_EXTERNAL_LIBS=ON -DENABLE_MPEG=OFF
          cmake --build /tmp/sndfile-build -j"$(nproc)"
          cmake --install /tmp/sndfile-build

          D="${DEPS_PREFIX}/lib"
          printf 'CREATE %s/libsndfile_merged.a\nADDLIB %s/libsndfile.a\nADDLIB %s/libFLAC.a\nADDLIB %s/libvorbisenc.a\nADDLIB %s/libvorbis.a\nADDLIB %s/libogg.a\nADDLIB %s/libopus.a\nSAVE\nEND\n' \
            "$D" "$D" "$D" "$D" "$D" "$D" "$D" > /tmp/merge.mri
          ar -M < /tmp/merge.mri
          mv "${DEPS_PREFIX}/lib/libsndfile_merged.a" "${DEPS_PREFIX}/lib/libsndfile.a"

          curl -fsSL "https://github.com/PortMidi/portmidi/archive/refs/tags/v${PORTMIDI_VERSION}.tar.gz" | tar -xz -C /tmp
          cmake -B /tmp/portmidi-build -S "/tmp/portmidi-${PORTMIDI_VERSION}" \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF -DBUILD_PORTMIDI_TESTS=OFF
          cmake --build /tmp/portmidi-build -j"$(nproc)"
          cmake --install /tmp/portmidi-build

          curl -fsSL "https://github.com/PortAudio/portaudio/archive/refs/tags/v${PORTAUDIO_VERSION}.tar.gz" | tar -xz -C /tmp
          cmake -B /tmp/portaudio-build -S "/tmp/portaudio-${PORTAUDIO_VERSION}" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="${DEPS_PREFIX}" \
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DPA_BUILD_STATIC=ON -DPA_BUILD_SHARED=OFF \
            -DPA_USE_ALSA=ON -DPA_ALSA_DYNAMIC=OFF -DPA_USE_JACK=ON
          cmake --build /tmp/portaudio-build -j"$(nproc)"
          cmake --install /tmp/portaudio-build

      - name: Build static liblo
        run: |
          curl -fsSL "https://github.com/radarsat1/liblo/releases/download/${LIBLO_VERSION}/liblo-${LIBLO_VERSION}.tar.gz" | tar -xz -C /tmp
          cd "/tmp/liblo-${LIBLO_VERSION}"
          ./configure --prefix="${DEPS_PREFIX}" --enable-static --disable-shared \
            --disable-examples --disable-tools --disable-doc CFLAGS="-fPIC -O2"
          make -j"$(nproc)"
          make install

      # - name: Remove shared liblo
      #   run: find / -xdev -name 'liblo.so*' -delete 2>/dev/null || true

      - name: Configure and build Csound
        env:
          PKG_CONFIG_PATH: "${{ env.DEPS_PREFIX }}/lib/pkgconfig"
        run: |
          cmake -B csound-build -S csound \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX}" \
            -DPortMidi_DIR="${DEPS_PREFIX}/lib/cmake/PortMidi" \
            -DCMAKE_C_FLAGS="-march=x86-64-v3" \
            -DCMAKE_CXX_FLAGS="-march=x86-64-v3" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_SHARED_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
            -DCMAKE_MODULE_LINKER_FLAGS="-static-libgcc -static-libstdc++ -Wl,--no-as-needed -lasound -ljack -Wl,--as-needed" \
            -DBUILD_PLUGINS=ON \
            -DUSE_AVX2=ON \
            -DUSE_LIBLO=ON \
            -DUSE_ALSA=ON \
            -DUSE_JACK=ON \
            -DUSE_PORTMIDI=ON \
            -DUSE_PORTAUDIO=ON \
            -DUSE_PULSEAUDIO=OFF \
            -DUSE_FLTK=OFF \
            -DBUILD_VIRTUAL_KEYBOARD=OFF \
            -DBUILD_JAVA_INTERFACE=OFF \
            -DBUILD_PYTHON_INTERFACE=OFF \
            -DINSTALL_PYTHON_INTERFACE=OFF \
            -DBUILD_LUA_INTERFACE=OFF \
            -DBUILD_CSBEATS=OFF \
            -DBUILD_TESTS=OFF
          cmake --build csound-build -j"$(nproc)"

      - name: Check PortMidi is linked statically
        run: |
          ! ldd csound-build/libpmidi.so | grep -F 'libportmidi.so'

      - name: Check PortAudio is linked statically
        run: |
          ! ldd csound-build/librtpa.so | grep -F 'libportaudio.so'
          ldd csound-build/librtpa.so | grep -F 'libasound.so'
          ldd csound-build/librtpa.so | grep -F 'libjack.so'

      - name: Configure and build repository plugins
        run: |
          cmake -B plugins-build -S . \
            -DAPIVERSION=7.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_PREFIX_PATH="${DEPS_PREFIX}" \
            -DCMAKE_FIND_LIBRARY_SUFFIXES=".a" \
            -DCMAKE_C_FLAGS="-march=x86-64-v3" \
            -DCMAKE_CXX_FLAGS="-march=x86-64-v3" \
            -DCMAKE_MODULE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build plugins-build -j"$(nproc)"

      - name: Create portable archive
        run: |
          mkdir -p dist/plugins
          cp csound-build/csound dist/
          find csound-build -name 'libcsound*.so*' -exec cp -P {} dist/ \;
          find csound-build -name '*.so' ! -name 'libcsound*' -exec cp {} dist/plugins/ \;
          find plugins-build -maxdepth 1 -type f -name '*.so' -exec cp {} dist/plugins/ \;
          cp assets/README.txt dist/plugins/
          (
            cd dist
            zip -r -y "../plugins-csound7-linux-portable.zip" .
          )

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-csound7-linux-portable
          path: dist
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: release-plugins-csound7-linux-portable
          path: plugins-csound7-linux-portable.zip
          if-no-files-found: error

  buildjob7:
    name: Build plugins on ${{ matrix.os }} (csound 7)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive
          cd csound
          git switch develop

      - name: windows build - csound 7
        if: runner.os == 'windows'
        run: |
          # where.exe vcpkg
          # $VCPKG_ROOT/vcpkg integrate install
          # vcpkg integrate install
          # $VCPKG_ROOT/vcpkg install libsndfile:x64-windows

          #vcpkg install libsndfile:x64-windows

          choco install libsndfile
          # choco install fluidsynth

          git submodule update --init --recursive --remote
          git submodule status --recursive

          cd csound
          git switch develop
          Copy-Item "Android/CsoundAndroid/jni/version.h" -Destination "include"
          cd ..

          Remove-Item -Recurse -Force build -ErrorAction Ignore
          mkdir build
          cd build

          # cmake -A x64 -DBUILD_JSUSFX_OPCODES=OFF -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows ..

          cmake -A x64 -DBUILD_JSUSFX_OPCODES=OFF -DBUILD_SNDMETA_OPCODES=OFF \DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -DAPIVERSION=7.0 -DVCPKG_TARGET_TRIPLET=x64-windows ..
          cmake --build . --parallel --config Release
          cd ..
          ls build/Release

          rm -ErrorAction Ignore Release/FLAC.dll, Release/ogg.dll, Release/opus.dll, Release/sndfile.dll, Release/vorbis*

          New-Item artifacts -ItemType Directory -ea 0
          Copy-Item -Path "build/Release/*.dll" -Destination "artifacts"
          Copy-Item "assets/README.txt" -Destination "artifacts"
          ls artifacts

          set-variable -name ARCHIVE -value "plugins-csound7-windows.zip"
          rm $ARCHIVE -ErrorAction Ignore
          7z a $ARCHIVE ./artifacts/*
          mv $ARCHIVE artifacts

      - name: linux build, csound 7
        if: runner.os == 'linux'
        run: |
          sudo apt-get install libsndfile1-dev
          sudo apt-get install nasm
          # sudo apt-get install libfluidsynth-dev

          git submodule update --init --recursive --remote
          git submodule status --recursive

          cd csound
          git switch develop
          ln -s Android/CsoundAndroid/jni/version.h ./include
          cd ..

          rm -fr build && mkdir build && cd build

          # cmake -DSKIP_FAST_MATH=True ..
          cmake -DAPIVERSION=7.0 ..
          cmake --build . --parallel

          ls

          cd ..
          mkdir -p artifacts
          cp build/*.so artifacts
          cp assets/README.txt artifacts

          # Make zip for release
          ARCHIVE=plugins-csound7-linux.zip
          7z a $ARCHIVE ./artifacts/*
          mv $ARCHIVE artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-csound7-${{ runner.os }}
          path: artifacts/*

  buildjob6:
    name: Build plugins on ${{ matrix.os }} (csound 6)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Checkout submodules
        run: |
          git submodule update --init --recursive
          cd csound
          git switch csound6

      - name: linux build
        if: runner.os == 'linux'
        run: |
          sudo apt update
          sudo apt-get install libsndfile1-dev
          sudo apt-get install nasm
          # sudo apt-get install libfluidsynth-dev

          git submodule update --init --recursive --remote
          git submodule status --recursive

          cd csound
          git switch csound6
          cd include
          ln -s ../Android/CsoundAndroid/jni/version.h .
          cd ../..

          rm -fr build && mkdir build && cd build

          # cmake -DSKIP_FAST_MATH=True ..
          cmake -DAPIVERSION=6.0 ..
          cmake --build . --parallel

          cd ..
          mkdir -p artifacts
          cp build/*.so artifacts
          cp assets/README.txt artifacts

          ARCHIVE=plugins-csound6-linux.zip
          7z a $ARCHIVE ./artifacts/*
          mv $ARCHIVE artifacts

      # Windows: Restore from cache the previously built ports.
      # If cache-miss, download and build vcpkg (aka "bootstrap vcpkg").
      #- name: Restore from cache and install vcpkg
      #  if: runner.os == 'windows'
      #  # Download and build vcpkg, without installing any port. If content is cached already, it is a no-op.
      #  uses: lukka/run-vcpkg@v6
      #  with:
      #    vcpkgArguments: libsndfile:x64-windows  # fluidsynth:x64-windows
      #    vcpkgTriplet: x64-windows
      #    vcpkgGitCommitId: "0bf3923f9fab4001c00f0f429682a0853b5749e0"
      #    # setupOnly: true

      - name: windows build
        if: runner.os == 'windows'
        run: |
          # where.exe vcpkg
          # $VCPKG_ROOT/vcpkg integrate install
          # vcpkg integrate install
          # $VCPKG_ROOT/vcpkg install libsndfile:x64-windows

          #vcpkg install libsndfile:x64-windows

          choco install libsndfile
          # ls "${ENV:PROGRAMFILES}\libsndfile\include"
          # choco install fluidsynth

          git submodule update --init --recursive --remote
          # git submodule foreach git pull origin master
          git submodule status --recursive
          echo "Finished submodules"

          # Copy-Item "Android/CsoundAndroid/jni/version.h" -Destination "csound/include"

          ls
          Remove-Item -Recurse -Force build -ErrorAction Ignore
          mkdir build
          cd build

          # cmake -A x64 -DBUILD_JSUSFX_OPCODES=OFF -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows ..

          echo "Listing VCPKG_ROOT: $env:VCPKG_ROOT"
          ls "$VCPKG_ROOT" -recurse

          cmake -A x64 -DBUILD_JSUSFX_OPCODES=OFF -DBUILD_SNDMETA_OPCODES=OFF \DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows ..
          cmake --build . --parallel --config Release
          cd ..
          ls build/Release

          # rm -ErrorAction Ignore Release/FLAC.dll, Release/ogg.dll, Release/opus.dll, Release/sndfile.dll, Release/vorbis*

          New-Item artifacts -ItemType Directory -ea 0
          Copy-Item -Path "build/Release/*.dll" -Destination "artifacts"
          Copy-Item "assets/README.txt" -Destination "artifacts"
          ls artifacts

          set-variable -name ARCHIVE -value "plugins-csound6-windows.zip"
          rm $ARCHIVE -ErrorAction Ignore
          7z a $ARCHIVE ./artifacts/*
          mv $ARCHIVE artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-csound6-${{ runner.os }}
          path: artifacts/*

  publish:
    name: Publish artifacts as a Pre-Release
    # if: contains(github.ref, 'tags/v')
    needs: [buildjob6, buildjob7, buildmacuniversal, buildlinuxportable]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Load Release URL File from release job
        uses: actions/download-artifact@v4.1.7
        with:
          pattern: plugins*
          path: plugins

      - name: Load portable Linux release archive
        uses: actions/download-artifact@v4.1.7
        with:
          name: release-plugins-csound7-linux-portable
          path: plugins

      - name: List files
        run: |
          ls -R

      - name: Publish
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          title: "Development Build"
          prerelease: True
          files: |
            plugins/**/plugins*.zip
